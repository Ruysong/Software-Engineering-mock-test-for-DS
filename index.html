 대문자 변환의 조건 재사용.","trap":"범위 조건을 || 로 쓰거나 수학식으로 쓰는 실수."},{"id":"MIX-18","week":12,"topic":"포인터 3개 정렬","grade":"S","type":"impl","q":"포인터로 세 정수를 받아 오름차순이 되도록 값을 정렬하는 함수를 작성하시오.","code":"void Sort3(int* a, int* b, int* c) {\n    // *a <= *b <= *c 가 되도록\n}","a":"void Sort3(int* a, int* b, int* c) {\n    int t;\n    if (*a > *b) { t=*a; *a=*b; *b=t; }\n    if (*b > *c) { t=*b; *b=*c; *c=t; }\n    if (*a > *b) { t=*a; *a=*b; *b=t; }\n}","ex":"세 번의 비교-교환으로 정렬. 각 교환은 *로 호출측 값을 직접 바꾼다. Swap 패턴의 확장.","trap":"포인터 자체가 아니라 *로 값을 교환해야 호출측에 반영."},{"id":"MIX-19","week":13,"topic":"동적 배열 복사","grade":"A+","type":"impl","q":"int 배열을 같은 크기의 새 동적 메모리에 복사해 반환하는 함수를 작성하시오.","code":"int* CopyArray(int* src, int n) {\n    // ...\n}","a":"int* CopyArray(int* src, int n) {\n    int* dst = (int*)malloc(sizeof(int) * n);\n    for (int i = 0; i < n; i++) dst[i] = src[i];\n    return dst;\n}","ex":"n개 정수 크기를 할당하고 원소를 하나씩 복사. 깊은 복사라 독립적이며 호출측이 free 해야 함.","trap":"dst = src(얕은 복사)로 하면 같은 메모리를 가리킴. 새로 할당해야 깊은 복사."},{"id":"MIX-20","week":10,"topic":"두 배열 합치기","grade":"A","type":"impl","q":"배열 a(n개)와 b(m개)를 result에 순서대로 합치는 함수를 작성하시오.","code":"void Merge(int a[], int n, int b[], int m, int result[]) {\n    // ...\n}","a":"void Merge(int a[], int n, int b[], int m, int result[]) {\n    int k = 0;\n    for (int i = 0; i < n; i++) result[k++] = a[i];\n    for (int i = 0; i < m; i++) result[k++] = b[i];\n}","ex":"쓰기 인덱스 k를 이어서 사용. a를 다 넣은 뒤 b를 이어 넣는다. result는 n+m 크기여야 함.","trap":"두 번째 루프에서 k를 0으로 리셋하면 a를 덮어쓴다. k는 계속 이어져야 함."},{"id":"MIX-21","week":11,"topic":"문자열 길이 비교","grade":"A","type":"impl","q":"두 문자열 중 더 긴 쪽의 주소를 반환하는 함수를 작성하시오(같으면 s1).","code":"char* Longer(char* s1, char* s2) {\n    // ...\n}","a":"char* Longer(char* s1, char* s2) {\n    int l1 = strlen(s1), l2 = strlen(s2);\n    return (l1 >= l2) ? s1 : s2;\n}","ex":"각 길이를 strlen으로 구해 비교, 더 긴 문자열의 시작 주소(char*)를 반환. 11.1 + 포인터 반환.","trap":"문자열을 값으로 반환할 수 없으므로 주소(char*)를 반환."},{"id":"MIX-22","week":14,"topic":"구조체 배열 최댓값","grade":"A+","type":"impl","q":"Car 배열에서 주행거리(mileage)가 가장 큰 차의 인덱스를 반환하는 함수를 작성하시오.","code":"int MaxMileageIndex(const Car cars[], int n) {\n    // ...\n}","a":"int MaxMileageIndex(const Car cars[], int n) {\n    int idx = 0;\n    for (int i = 1; i < n; i++)\n        if (cars[i].mileage > cars[idx].mileage)\n            idx = i;\n    return idx;\n}","ex":"9.2 최댓값 인덱스 + 구조체 멤버 접근(cars[i].mileage). 배열 원소는 변수라 점(.) 사용.","trap":"cars[i]는 구조체 변수이므로 ->가 아니라 .로 멤버 접근."},{"id":"MIX-23","week":13,"topic":"메모리 누수 진단","grade":"S+","type":"fix","q":"이 코드에는 메모리 누수가 있다. 원인을 지적하고 고치시오.","code":"int* p = malloc(sizeof(int) * 10);\np = malloc(sizeof(int) * 20);  // 재할당 의도\nfree(p);","a":"두 번째 malloc 전에 첫 번째 메모리를 잃어버려 누수.\n→ 첫 줄의 메모리를 free 하거나, realloc(p, sizeof(int)*20) 사용","ex":"p가 새 주소로 덮어써지면 처음 할당한 10칸의 주소를 잃어 영영 해제 못 한다. 크기를 바꾸려면 realloc, 아니면 기존 것을 free.","trap":"같은 포인터에 malloc을 두 번 하면 첫 할당이 누수됨."}];

/* ===== 상태 / 영구저장 ===== */
const LS_KEY = 'c_bank_marks_v1';
let marks = {};               // { id: 'r'|'y'|'g'|'s' }
try { marks = JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e){ marks = {}; }
function saveMarks(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(marks)); }catch(e){} }

let filterWk='all', filterTy='all', filterGr='all', filterMk='all', searchTerm='';
let deck = [];                // 현재 필터된 문제 배열
let idx = 0;                  // deck 내 위치
let revealed = false;

/* ===== 유틸: 코드 하이라이트 ===== */
function escapeHTML(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderCode(code){
  let h = escapeHTML(code);
  h = h.split('\n').map(line=>{
    const i = line.indexOf('//');
    return i>=0 ? line.slice(0,i)+'<span class="cmt">'+line.slice(i)+'</span>' : line;
  }).join('\n');
  h = h.replace(/_{3,}/g, m=>'<span class="blank">'+m+'</span>');
  return h;
}
function gradeClass(g){return 'g-'+g.replace('+','plus');}
const TYPE_LABEL={blank:'빈칸',fix:'오류수정',trace:'실행추적',impl:'변형구현',concept:'개념'};
const WEEK_SHORT={9:'배열',10:'배열·함수',11:'문자열',12:'포인터',13:'포인터심화',14:'구조체'};

/* ===== 덱 구성 ===== */
function buildDeck(keepId){
  const prevId = keepId || (deck[idx] && deck[idx].id);
  deck = PROBLEMS.filter(p=>{
    if(filterWk!=='all' && String(p.week)!==filterWk) return false;
    if(filterTy!=='all' && p.type!==filterTy) return false;
    if(filterGr!=='all' && p.grade!==filterGr) return false;
    if(filterMk!=='all'){
      const m = marks[p.id];
      if(filterMk==='none'){ if(m) return false; }
      else if(m!==filterMk) return false;
    }
    if(searchTerm){
      const hay=(p.id+' '+p.topic+' '+p.q).replace(/<[^>]+>/g,'').toLowerCase();
      if(!hay.includes(searchTerm)) return false;
    }
    return true;
  });
  // 이전 위치 유지 시도
  const np = deck.findIndex(p=>p.id===prevId);
  idx = np>=0 ? np : 0;
  render();
}

/* ===== 렌더 ===== */
const stage = document.getElementById('stage');
function render(){
  document.getElementById('totNum').textContent = deck.length;
  if(deck.length===0){
    stage.innerHTML = `<div class="empty"><div class="big">∅</div>조건에 맞는 문제가 없습니다.<br>필터를 바꾸거나 검색어를 지워보세요.</div>`;
    document.getElementById('curNum').textContent = 0;
    document.getElementById('progFill').style.width='0%';
    syncMarkBar(null);
    return;
  }
  if(idx>=deck.length) idx=deck.length-1;
  if(idx<0) idx=0;
  const p = deck[idx];
  revealed=false;

  const trapHTML = p.trap ? `
        <div class="ans-label trap"><span class="dot"></span>함정 / 주의</div>
        <div class="trap-text">${p.trap}</div>` : '';

  stage.innerHTML = `
  <div class="card" id="card">
    <div class="pane pane-q">
      <div class="meta-row">
        <span class="id-badge">${p.id}</span>
        <span class="grade-badge ${gradeClass(p.grade)}">${p.grade}</span>
        <span class="type-badge t-${p.type}">${TYPE_LABEL[p.type]}</span>
        <span class="topic">W${p.week} · ${p.topic}</span>
      </div>
      <div class="pane-label"><span class="dot"></span>문제</div>
      <div class="q-text">${p.q}</div>
      <pre>${renderCode(p.code)}</pre>
    </div>
    <div class="pane pane-a">
      <div class="answer-content">
        <div class="ans-label answer"><span class="dot"></span>정답</div>
        <pre>${renderCode(p.a)}</pre>
        <div class="ans-label explain"><span class="dot"></span>해설</div>
        <div class="explain-text">${p.ex}</div>
        ${trapHTML}
      </div>
      <div class="cover" id="cover">
        <div class="cover-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></div>
        <div class="cover-text">정답 보기</div>
        <div class="cover-key">클릭 · <b>Space</b> · <b>↓</b></div>
      </div>
    </div>
  </div>`;

  document.getElementById('cover').addEventListener('click', reveal);
  document.getElementById('curNum').textContent = idx+1;
  document.getElementById('progFill').style.width = ((idx+1)/deck.length*100)+'%';
  document.getElementById('prevBtn').disabled = (idx===0);
  document.getElementById('nextBtn').disabled = (idx===deck.length-1);
  syncMarkBar(p.id);
}

function reveal(){
  const card=document.getElementById('card');
  if(card){ card.classList.add('revealed'); revealed=true; }
}

/* 카드 전환 (슬라이드) */
function go(delta){
  if(deck.length===0) return;
  const ni = idx+delta;
  if(ni<0 || ni>=deck.length) return;
  const card=document.getElementById('card');
  if(card){
    card.style.setProperty('--slidedir', delta>0 ? '-24px':'24px');
    card.classList.add('swapping');
  }
  setTimeout(()=>{ idx=ni; render(); }, 150);
}

/* ===== 표시(자기평가) ===== */
function syncMarkBar(id){
  const cur = id ? marks[id] : null;
  document.querySelectorAll('.mark-btn').forEach(b=>{
    b.className='mark-btn'+(cur===b.dataset.m ? ' sel-'+b.dataset.m : '');
  });
}
function setMark(m){
  if(deck.length===0) return;
  const p=deck[idx];
  if(marks[p.id]===m) delete marks[p.id];   // 같은 거 누르면 해제
  else marks[p.id]=m;
  saveMarks();
  syncMarkBar(p.id);
  // 표시 필터가 켜져 있으면 덱에서 빠질 수 있으니 재구성
  if(filterMk!=='all') buildDeck();
}
document.querySelectorAll('.mark-btn').forEach(b=>{
  b.addEventListener('click',()=>setMark(b.dataset.m));
});

/* ===== 네비 버튼 ===== */
document.getElementById('prevBtn').addEventListener('click',()=>go(-1));
document.getElementById('nextBtn').addEventListener('click',()=>{
  if(!revealed){ reveal(); } else { go(1); }
});

/* ===== 필터 ===== */
function bindChips(cls, setter){
  document.querySelectorAll('.chip.'+cls).forEach(c=>c.addEventListener('click',()=>{
    document.querySelectorAll('.chip.'+cls).forEach(x=>x.classList.remove('active'));
    c.classList.add('active'); setter(c); buildDeck();
  }));
}
bindChips('wk', c=>filterWk=c.dataset.wk);
bindChips('ty', c=>filterTy=c.dataset.ty);
bindChips('gr', c=>filterGr=c.dataset.gr);
bindChips('mk', c=>filterMk=c.dataset.mk);
document.getElementById('search').addEventListener('input',e=>{
  searchTerm=e.target.value.trim().toLowerCase(); buildDeck();
});
document.getElementById('filterToggle').addEventListener('click',function(){
  const fp=document.getElementById('filterPanel');
  fp.classList.toggle('open'); this.classList.toggle('on');
});
document.getElementById('shuffleBtn').addEventListener('click',()=>{
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  idx=0; render();
});
document.getElementById('resetMarks').addEventListener('click',()=>{
  if(confirm('모든 표시(🔴🟡🟢⭐)를 지울까요?')){ marks={}; saveMarks(); buildDeck(); }
});

/* ===== 단축키 ===== */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  switch(e.key){
    case 'ArrowRight': case 'Enter': e.preventDefault(); if(!revealed) reveal(); else go(1); break;
    case 'ArrowLeft': e.preventDefault(); go(-1); break;
    case ' ': case 'ArrowDown': e.preventDefault(); reveal(); break;
    case '1': setMark('r'); break;
    case '2': setMark('y'); break;
    case '3': setMark('g'); break;
    case '4': setMark('s'); break;
    case 'f': e.preventDefault();
      document.getElementById('filterPanel').classList.add('open');
      document.getElementById('filterToggle').classList.add('on');
      document.getElementById('search').focus(); break;
    case 'Escape':
      document.getElementById('filterPanel').classList.remove('open');
      document.getElementById('filterToggle').classList.remove('on'); break;
  }
});

/* ===== 시작 ===== */
document.getElementById('totNum').textContent = PROBLEMS.length;
buildDeck();
</script>
</body>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소프트웨어공학 지문형 모의고사</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=JetBrains+Mono:wght@500;700&display=swap');

  :root{
    --bg:#f5f2eb;--paper:#fffefa;--ink:#24231f;--muted:#77746b;--line:#e4dfd4;
    --accent:#7259d6;--accent-soft:#eeeafd;--green:#26875a;--green-soft:#e8f6ee;
    --red:#c44c45;--red-soft:#fbecea;--amber:#bd7b18;--amber-soft:#fff3dc;
    --shadow:0 15px 45px rgba(52,45,32,.11);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:'Gowun Dodum',sans-serif;background:var(--bg);color:var(--ink);overflow:hidden}
  button,select{font:inherit}
  button{cursor:pointer}

  .topbar{height:76px;background:rgba(255,254,250,.96);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:12px 24px;box-shadow:0 3px 18px rgba(52,45,32,.05);position:relative;z-index:10}
  .brand{min-width:265px}.brand strong{display:block;font-size:19px}.brand span{font-size:12px;color:var(--muted)}
  .modes{display:flex;gap:7px}
  .mode-btn,.utility-btn{border:1px solid var(--line);background:var(--paper);border-radius:10px;padding:9px 13px;color:var(--muted);transition:.15s}
  .ox-link{text-decoration:none;border:1px solid var(--accent);background:var(--accent-soft);border-radius:10px;padding:9px 13px;color:var(--accent);font-weight:700}
  .mode-btn:hover,.utility-btn:hover{border-color:var(--accent);color:var(--accent)}
  .mode-btn.active{background:var(--accent);border-color:var(--accent);color:white}
  .mode-btn b{font-family:'JetBrains Mono',monospace;font-size:11px;margin-left:4px}
  .section-nav{margin-left:auto;display:flex;align-items:center;gap:8px}
  select{max-width:330px;border:1px solid var(--line);background:var(--paper);border-radius:10px;padding:9px 34px 9px 12px;color:var(--ink)}
  .icon-btn{width:39px;height:39px;border:1px solid var(--line);border-radius:10px;background:var(--paper);font-size:17px;color:var(--muted)}
  .icon-btn:disabled{opacity:.35;cursor:not-allowed}

  .workspace{height:calc(100vh - 76px);display:grid;grid-template-columns:minmax(480px,1.08fr) minmax(500px,.92fr);gap:18px;padding:18px;max-width:1800px;margin:auto}
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);min-width:0;overflow:hidden}
  .passage-panel,.quiz-panel{display:flex;flex-direction:column}
  .panel-head{padding:20px 26px 15px;border-bottom:1px solid var(--line);background:rgba(255,254,250,.96)}
  .eyebrow{font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
  h1{font-size:25px;line-height:1.35;margin:6px 0 0}
  .passage-scroll,.quiz-scroll{overflow:auto;scrollbar-gutter:stable;flex:1 1 auto;min-height:0}
  .passage-scroll{padding:25px 30px 44px}
  .passage-text{font-size:17.5px;line-height:1.95;word-break:keep-all}
  .passage-text p{margin:0 0 20px}
  .points{margin-top:28px;background:var(--accent-soft);border:1px solid #ddd5fb;border-radius:14px;padding:17px 20px}
  .points strong{color:var(--accent);font-size:14px}.points ul{margin:10px 0 0;padding-left:21px}.points li{margin:6px 0;line-height:1.65}

  .quiz-head{display:flex;align-items:center;gap:14px}
  .quiz-title{flex:1}.quiz-title h2{font-size:21px;margin:4px 0 0}
  .score{font-family:'JetBrains Mono',monospace;font-weight:700;border-radius:11px;padding:9px 12px;background:var(--accent-soft);color:var(--accent);white-space:nowrap}
  .quiz-scroll{padding:20px 22px 115px}
  .question{border:1px solid var(--line);border-radius:15px;padding:18px;margin-bottom:15px;background:white;transition:.2s}
  .question.correct{border-color:#a8d4bd;box-shadow:0 0 0 3px var(--green-soft)}
  .question.wrong{border-color:#e2aaa6;box-shadow:0 0 0 3px var(--red-soft)}
  .question.unanswered{border-color:#e1bd7e;box-shadow:0 0 0 3px var(--amber-soft)}
  .q-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:13px}
  .q-num{font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:13px;font-weight:700;margin-top:2px}
  .q-prompt{font-size:16px;line-height:1.6;font-weight:600;flex:1;word-break:keep-all}
  .star{border:0;background:transparent;color:#c9c5bb;font-size:22px;padding:0 2px;line-height:1}
  .star.on{color:#e2a728}
  .choices{display:grid;gap:7px}
  .choice{width:100%;text-align:left;border:1px solid var(--line);background:#fbfaf7;border-radius:10px;padding:10px 12px;display:flex;gap:10px;line-height:1.5;color:var(--ink)}
  .choice:hover{border-color:#bcb1e9;background:#f8f6ff}
  .choice.selected{border-color:var(--accent);background:var(--accent-soft)}
  .choice.answer{border-color:var(--green);background:var(--green-soft);color:#176b44}
  .choice.incorrect{border-color:var(--red);background:var(--red-soft);color:#9e3832}
  .choice:disabled{cursor:default}
  .choice-mark{font-family:'JetBrains Mono',monospace;font-weight:700;flex:0 0 18px}
  .explanation{display:none;margin-top:14px;border-top:1px dashed var(--line);padding-top:14px;line-height:1.65;font-size:14.5px}
  .graded .explanation{display:block}
  .result-label{font-weight:700;margin-bottom:4px}.correct .result-label{color:var(--green)}.wrong .result-label{color:var(--red)}.unanswered .result-label{color:var(--amber)}
  .remove-wrong{border:1px solid #e3b5b1;background:white;color:var(--red);border-radius:8px;padding:5px 9px;margin-top:10px;font-size:12px}

  .gradebar{position:absolute;bottom:0;left:0;right:0;padding:14px 22px;background:rgba(255,254,250,.96);border-top:1px solid var(--line);backdrop-filter:blur(8px);display:flex;gap:10px;align-items:center}
  .quiz-panel{position:relative}
  .grade-btn{flex:1;border:0;border-radius:12px;background:var(--ink);color:white;padding:13px 18px;font-weight:700;font-size:16px}
  .grade-btn:hover{background:#000}
  .reset-btn{border:1px solid var(--line);background:white;border-radius:12px;padding:13px 16px;color:var(--muted)}
  .empty{margin:auto;padding:40px;text-align:center;color:var(--muted);line-height:1.8}
  .empty strong{display:block;color:var(--ink);font-size:20px;margin-bottom:6px}
  .mobile-passage{display:none}

  @media(max-width:1050px){
    body{overflow:auto}
    .topbar{height:auto;min-height:76px;flex-wrap:wrap;padding:11px 14px;position:sticky;top:0}
    .brand{min-width:0;flex:1}.brand span{display:none}
    .modes{order:3;width:100%}.mode-btn{flex:1;padding:8px 6px}
    .section-nav{margin-left:0}.section-nav select{max-width:220px}
    .workspace{height:auto;display:block;padding:12px}
    .panel{margin-bottom:12px}
    .passage-panel{max-height:none}.passage-scroll,.quiz-scroll{overflow:visible;flex:none}
    .passage-scroll{padding:20px}.passage-text{font-size:16.5px;line-height:1.85}
    .quiz-scroll{padding:14px 14px 100px}
    .gradebar{position:fixed;z-index:20}
  }
  @media(max-width:650px){
    .brand strong{font-size:16px}.utility-btn{display:none}
    .section-nav{width:100%}.section-nav select{flex:1;max-width:none;min-width:0}
    .passage-panel.collapsed .passage-scroll{display:none}
    .passage-panel.collapsed .panel-head{border-bottom:0}
    .mobile-passage{display:inline-block;border:1px solid var(--line);background:white;border-radius:8px;padding:5px 9px;color:var(--accent);float:right}
    .panel-head{padding:16px 18px}h1{font-size:20px}
    .question{padding:15px}.q-prompt{font-size:15px}.choice{font-size:14px}
  }
</style>
</head>
<body>
<header class="topbar">
  <div class="brand"><strong>소프트웨어공학 지문형 모의고사</strong><span>18개 지문 · 90문항 · 자동 채점</span></div>
  <nav class="modes">
    <button class="mode-btn active" data-mode="all">전체 <b id="allCount">90</b></button>
    <button class="mode-btn" data-mode="wrong">오답 <b id="wrongCount">0</b></button>
    <button class="mode-btn" data-mode="star">별표 <b id="starCount">0</b></button>
  </nav>
  <a class="ox-link" href="ox.html">OX 퀴즈</a>
  <div class="section-nav">
    <button class="icon-btn" id="prevBtn" aria-label="이전 지문">‹</button>
    <select id="sectionSelect" aria-label="지문 선택"></select>
    <button class="icon-btn" id="nextBtn" aria-label="다음 지문">›</button>
    <button class="utility-btn" id="randomBtn">랜덤</button>
  </div>
</header>

<main class="workspace" id="workspace">
  <section class="panel passage-panel" id="passagePanel">
    <div class="panel-head">
      <button class="mobile-passage" id="passageToggle">접기</button>
      <div class="eyebrow" id="passageNumber"></div>
      <h1 id="passageTitle"></h1>
    </div>
    <div class="passage-scroll" id="passageScroll">
      <article class="passage-text" id="passageText"></article>
      <aside class="points"><strong>확인 포인트</strong><ul id="pointList"></ul></aside>
    </div>
  </section>

  <section class="panel quiz-panel" id="quizPanel">
    <div class="panel-head quiz-head">
      <div class="quiz-title"><div class="eyebrow" id="modeLabel">전체 문제</div><h2 id="questionHeading">객관식 5문제</h2></div>
      <div class="score" id="score">미채점</div>
    </div>
    <div class="quiz-scroll" id="questionList"></div>
    <div class="gradebar">
      <button class="reset-btn" id="resetBtn">선택 초기화</button>
      <button class="grade-btn" id="gradeBtn">문제 채점하기</button>
    </div>
  </section>
</main>

<script src="data.js"></script>
<script>
const byId=id=>document.getElementById(id);
const allCount=byId('allCount'),wrongCount=byId('wrongCount'),starCount=byId('starCount');
const sectionSelect=byId('sectionSelect'),prevBtn=byId('prevBtn'),nextBtn=byId('nextBtn'),randomBtn=byId('randomBtn');
const passagePanel=byId('passagePanel'),passageScroll=byId('passageScroll'),passageNumber=byId('passageNumber');
const passageTitle=byId('passageTitle'),passageText=byId('passageText'),pointList=byId('pointList'),passageToggle=byId('passageToggle');
const modeLabel=byId('modeLabel'),questionHeading=byId('questionHeading'),questionList=byId('questionList'),score=byId('score');
const gradeBtn=byId('gradeBtn'),resetBtn=byId('resetBtn');
const STORAGE_KEY = 'softwareEngineeringMockTestV1';
const MARKS = ['①','②','③','④','⑤'];
const state = loadState();
let mode = 'all';
let sectionId = Number(localStorage.getItem('softwareEngineeringLastSection')) || 1;
let selections = {};
let graded = false;

function loadState(){
  try{
    const saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    return {wrong:saved.wrong||{},stars:saved.stars||{}};
  }catch{return {wrong:{},stars:{}}}
}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));updateCounts()}
function currentSections(){
  if(mode==='all') return SECTIONS;
  const collection=mode==='wrong'?state.wrong:state.stars;
  return SECTIONS.filter(section=>section.questions.some(question=>collection[question.id]));
}
function currentSection(){return SECTIONS.find(section=>section.id===sectionId)}
function visibleQuestions(section){
  if(mode==='all') return section.questions;
  const collection=mode==='wrong'?state.wrong:state.stars;
  return section.questions.filter(question=>collection[question.id]);
}
function updateCounts(){
  allCount.textContent=SECTIONS.reduce((sum,section)=>sum+section.questions.length,0);
  wrongCount.textContent=Object.keys(state.wrong).length;
  starCount.textContent=Object.keys(state.stars).length;
}
function escapeHTML(value){
  return value.replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
}
function renderNavigation(){
  const available=currentSections();
  if(available.length&&!available.some(section=>section.id===sectionId)) sectionId=available[0].id;
  sectionSelect.innerHTML=available.map(section=>`<option value="${section.id}">${section.id}. ${escapeHTML(section.title)}</option>`).join('');
  sectionSelect.value=sectionId;
  const index=available.findIndex(section=>section.id===sectionId);
  prevBtn.disabled=index<=0;
  nextBtn.disabled=index<0||index===available.length-1;
}
function render(){
  renderNavigation();
  const section=currentSection();
  const questions=section?visibleQuestions(section):[];
  if(!section||questions.length===0){
    passageNumber.textContent='STORAGE';
    passageTitle.textContent=mode==='wrong'?'오답 저장소':'별표 저장소';
    passageText.innerHTML=`<div class="empty"><strong>${mode==='wrong'?'저장된 오답이 없습니다':'별표 문제가 없습니다'}</strong>문제를 풀거나 별표를 누르면 이곳에서 지문과 함께 다시 볼 수 있습니다.</div>`;
    pointList.innerHTML='';
    modeLabel.textContent=mode==='wrong'?'오답 저장소':'별표 저장소';
    questionHeading.textContent='저장된 문제가 없습니다';
    questionList.innerHTML='';
    score.textContent='-';
    gradeBtn.disabled=true;
    resetBtn.disabled=true;
    return;
  }
  gradeBtn.disabled=false;
  resetBtn.disabled=false;
  localStorage.setItem('softwareEngineeringLastSection',sectionId);
  passageNumber.textContent=`PASSAGE ${String(section.id).padStart(2,'0')} / 18`;
  passageTitle.textContent=section.title;
  passageText.innerHTML=section.passage.map(paragraph=>`<p>${escapeHTML(paragraph)}</p>`).join('');
  pointList.innerHTML=section.points.map(point=>`<li>${escapeHTML(point)}</li>`).join('');
  modeLabel.textContent=mode==='all'?'전체 문제':mode==='wrong'?'오답 저장소':'별표 저장소';
  questionHeading.textContent=`객관식 ${questions.length}문제`;
  score.textContent='미채점';
  graded=false;
  selections={};
  questionList.innerHTML=questions.map((question,index)=>questionHTML(question,index)).join('');
  gradeBtn.textContent=`${questions.length}문제 채점하기`;
  bindQuestions();
}
function questionHTML(question,index){
  const choices=question.choices.map((choice,choiceIndex)=>`
    <button class="choice" data-choice="${choiceIndex}">
      <span class="choice-mark">${MARKS[choiceIndex]}</span><span>${escapeHTML(choice)}</span>
    </button>`).join('');
  return `<article class="question" data-id="${question.id}">
    <div class="q-top"><span class="q-num">Q${index+1}</span><div class="q-prompt">${escapeHTML(question.prompt)}</div>
      <button class="star ${state.stars[question.id]?'on':''}" data-star aria-label="별표">${state.stars[question.id]?'★':'☆'}</button>
    </div>
    <div class="choices">${choices}</div>
    <div class="explanation"><div class="result-label"></div><div>${escapeHTML(question.explanation)}</div>
      ${state.wrong[question.id]?'<button class="remove-wrong" data-remove>오답 저장소에서 제거</button>':''}
    </div>
  </article>`;
}
function bindQuestions(){
  questionList.querySelectorAll('.question').forEach(card=>{
    const id=card.dataset.id;
    card.querySelectorAll('.choice').forEach(choice=>choice.addEventListener('click',()=>{
      if(graded)return;
      selections[id]=Number(choice.dataset.choice);
      card.querySelectorAll('.choice').forEach(item=>item.classList.toggle('selected',item===choice));
    }));
    card.querySelector('[data-star]').addEventListener('click',event=>{
      state.stars[id]?delete state.stars[id]:state.stars[id]=true;
      event.currentTarget.classList.toggle('on',!!state.stars[id]);
      event.currentTarget.textContent=state.stars[id]?'★':'☆';
      saveState();
    });
    card.querySelector('[data-remove]')?.addEventListener('click',()=>{
      delete state.wrong[id];saveState();
      if(mode==='wrong')render();
    });
  });
}
function grade(){
  if(graded)return;
  const section=currentSection();
  const questions=visibleQuestions(section);
  let correct=0;
  questions.forEach(question=>{
    const card=questionList.querySelector(`[data-id="${question.id}"]`);
    const selected=selections[question.id];
    card.classList.add('graded');
    card.querySelectorAll('.choice').forEach(choice=>{
      const value=Number(choice.dataset.choice);
      choice.disabled=true;
      if(value===question.answer)choice.classList.add('answer');
      if(value===selected&&selected!==question.answer)choice.classList.add('incorrect');
    });
    const label=card.querySelector('.result-label');
    if(selected===question.answer){
      correct++;card.classList.add('correct');label.textContent='정답입니다.';
    }else if(selected===undefined){
      card.classList.add('unanswered');label.textContent=`미응답 · 정답 ${MARKS[question.answer]}`;
      state.wrong[question.id]=true;
    }else{
      card.classList.add('wrong');label.textContent=`오답 · 정답 ${MARKS[question.answer]}`;
      state.wrong[question.id]=true;
    }
  });
  graded=true;score.textContent=`${correct} / ${questions.length}`;gradeBtn.textContent='채점 완료';saveState();
}
function changeSection(delta){
  const available=currentSections();
  const index=available.findIndex(section=>section.id===sectionId);
  if(available[index+delta]){sectionId=available[index+delta].id;render();passageScroll.scrollTop=0;questionList.parentElement.scrollTop=0}
}

document.querySelectorAll('.mode-btn').forEach(button=>button.addEventListener('click',()=>{
  mode=button.dataset.mode;
  document.querySelectorAll('.mode-btn').forEach(item=>item.classList.toggle('active',item===button));
  const available=currentSections();sectionId=available[0]?.id||1;render();
}));
sectionSelect.addEventListener('change',()=>{sectionId=Number(sectionSelect.value);render()});
prevBtn.addEventListener('click',()=>changeSection(-1));
nextBtn.addEventListener('click',()=>changeSection(1));
randomBtn.addEventListener('click',()=>{const available=currentSections();sectionId=available[Math.floor(Math.random()*available.length)]?.id||1;render()});
gradeBtn.addEventListener('click',grade);
resetBtn.addEventListener('click',render);
passageToggle.addEventListener('click',()=>{
  passagePanel.classList.toggle('collapsed');
  passageToggle.textContent=passagePanel.classList.contains('collapsed')?'지문 보기':'접기';
});
updateCounts();render();
</script>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>소프트웨어공학 OX 퀴즈</title>
<style>
:root{--bg:#f5f2eb;--paper:#fffefa;--ink:#24231f;--muted:#77746b;--line:#e4dfd4;--accent:#7259d6;--green:#26875a;--red:#c44c45}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,"Malgun Gothic",sans-serif}
header{position:sticky;top:0;z-index:2;background:rgba(255,254,250,.96);border-bottom:1px solid var(--line);padding:14px 20px;display:flex;align-items:center;gap:12px}
h1{font-size:19px;margin:0}.back{color:var(--accent);text-decoration:none;font-weight:700}.spacer{flex:1}select{padding:9px;border:1px solid var(--line);border-radius:9px;background:white}
main{max-width:760px;margin:28px auto;padding:0 16px}.status{display:flex;justify-content:space-between;color:var(--muted);margin-bottom:12px}.bar{height:7px;background:#e7e2d8;border-radius:10px;overflow:hidden;margin-bottom:20px}.bar i{display:block;height:100%;background:var(--accent)}
.card{background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:30px;box-shadow:0 15px 45px rgba(52,45,32,.1)}.num{color:var(--accent);font-weight:800}.statement{font-size:23px;line-height:1.65;margin:20px 0 28px;word-break:keep-all}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:12px}.answers button{border:2px solid var(--line);background:white;border-radius:15px;padding:22px;font-size:25px;font-weight:900;cursor:pointer}.answers button:hover{border-color:var(--accent)}
.result{display:none;margin-top:22px;padding:18px;border-radius:13px;line-height:1.65}.result.show{display:block}.result.correct{background:#e8f6ee;color:#176b44}.result.wrong{background:#fbecea;color:#9e3832}.result strong{display:block;margin-bottom:5px}
.next{display:none;width:100%;margin-top:15px;border:0;border-radius:12px;background:var(--ink);color:white;padding:14px;font-weight:800;cursor:pointer}.next.show{display:block}.empty{text-align:center;padding:60px;color:var(--muted)}
@media(max-width:600px){header{flex-wrap:wrap}.spacer{display:none}select{width:100%}.card{padding:22px}.statement{font-size:19px}.answers button{padding:18px}}
</style>
</head>
<body>
<header><a class="back" href="index.html">← 객관식으로</a><h1>OX 퀴즈</h1><span class="spacer"></span><select id="week"><option value="7">7주차 설계 · 70문제</option><option disabled>9주차 · 준비 중</option><option disabled>10주차 · 준비 중</option><option disabled>11주차 · 준비 중</option><option disabled>12주차 · 준비 중</option></select></header>
<main id="app"></main>
<script src="ox-data.js"></script>
<script>
const app=document.querySelector("#app"), section=OX_SECTIONS[0];let index=0,correct=0,answered=false;
function render(){const q=section.questions[index];answered=false;app.innerHTML=`<div class="status"><b>${section.title}</b><span>${index+1} / ${section.questions.length} · 정답 ${correct}</span></div><div class="bar"><i style="width:${(index/section.questions.length)*100}%"></i></div><article class="card"><span class="num">OX ${String(index+1).padStart(2,"0")}</span><div class="statement">${q.statement}</div><div class="answers"><button data-value="true">O</button><button data-value="false">X</button></div><div class="result" id="result"></div><button class="next" id="next">${index===section.questions.length-1?"결과 보기":"다음 문제"}</button></article>`;document.querySelectorAll("[data-value]").forEach(b=>b.onclick=()=>answer(b.dataset.value==="true"));document.querySelector("#next").onclick=next}
function answer(value){if(answered)return;answered=true;const q=section.questions[index],ok=value===q.answer;if(ok)correct++;const box=document.querySelector("#result");box.className=`result show ${ok?"correct":"wrong"}`;box.innerHTML=`<strong>${ok?"정답입니다.":"틀렸습니다. 정답은 "+(q.answer?"O":"X")+"입니다."}</strong>${q.explanation}`;document.querySelector("#next").classList.add("show");document.querySelectorAll("[data-value]").forEach(b=>b.disabled=true)}
function next(){if(index<section.questions.length-1){index++;render()}else app.innerHTML=`<div class="card empty"><h2>7주차 완료</h2><p>${section.questions.length}문제 중 ${correct}문제를 맞혔습니다.</p><button class="next show" onclick="index=0;correct=0;render()">다시 풀기</button></div>`}
render();
</script>
</body></html>
